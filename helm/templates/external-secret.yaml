# ExternalSecret — syncs credentials from the org's secrets manager into a K8s Secret.
# Fill in externalSecret.secretStoreName in values.prod.yaml before deploying.
# Requires the External Secrets Operator (ESO) to be installed in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "team-management.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "team-management.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: SecretStore
  target:
    name: {{ include "team-management.secretName" . }}
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: team-management/DATABASE_URL
    - secretKey: AUTH_SECRET
      remoteRef:
        key: team-management/AUTH_SECRET
    - secretKey: MEILISEARCH_KEY
      remoteRef:
        key: team-management/MEILISEARCH_KEY
    # SMTP — remove entries below if email is disabled
    - secretKey: SMTP_HOST
      remoteRef:
        key: team-management/SMTP_HOST
    - secretKey: SMTP_PORT
      remoteRef:
        key: team-management/SMTP_PORT
    - secretKey: SMTP_USER
      remoteRef:
        key: team-management/SMTP_USER
    - secretKey: SMTP_PASS
      remoteRef:
        key: team-management/SMTP_PASS
    - secretKey: SMTP_FROM
      remoteRef:
        key: team-management/SMTP_FROM
