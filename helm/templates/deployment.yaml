apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "team-management.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "team-management.labels" . | nindent 4 }}
    {{- include "team-management.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "team-management.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "team-management.labels" . | nindent 8 }}
        {{- include "team-management.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "team-management.configmapName" . }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: DATABASE_URL
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: AUTH_SECRET
            - name: MEILISEARCH_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: MEILISEARCH_KEY
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: SMTP_HOST
                  optional: true
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: SMTP_PORT
                  optional: true
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: SMTP_USER
                  optional: true
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: SMTP_PASS
                  optional: true
            - name: SMTP_FROM
              valueFrom:
                secretKeyRef:
                  name: {{ include "team-management.secretName" . }}
                  key: SMTP_FROM
                  optional: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
