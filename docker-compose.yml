services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: team_management
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    env_file:
      - .env
    build: 
      context: .
      target: migrator # Or 'builder' if you need the source code
    command: npx drizzle-kit migrate --config=drizzle.config.js
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/team_management
      ENV: ${ENV}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  app:
    env_file:
      - .env
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      ENV: ${ENV}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  pgdata:
